<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>LMN | Đăng Ký Tài Khoản</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white">

  <div class="auth-wrapper">
    <div class="auth-image-side d-none d-lg-flex" style="background-image: url('https://images.unsplash.com/photo-1516251193007-45ef944abb0b?q=80&w=2070&auto=format&fit=crop');">
      <div class="auth-image-content">
          <a href="index.html" class="navbar-brand text-white text-decoration-none fs-1">LMN</a>
          <p class="small text-uppercase letter-spacing-5 mt-3 opacity-75">Tham Gia Cộng Đồng LMN</p>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-card auth-card-register">
          <div class="mb-4">
              <a href="index.html" class="text-black text-decoration-none d-lg-none d-block mb-4 fw-black fs-2">LMN</a>
              <h2 class="fw-black text-uppercase letter-spacing-5 mb-2">Đăng Ký</h2>
              <p class="text-muted small">Khởi tạo phong cách tối giản của riêng bạn.</p>
          </div>

          <form id="registerForm">
            <div class="row g-3">
              <div class="col-6">
                <input type="text" id="fullName" class="form-control-luxury" placeholder="HỌ VÀ TÊN" required>
              </div>
              <div class="col-6">
                <input type="email" id="email" class="form-control-luxury" placeholder="EMAIL" required>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-6">
                <input type="text" id="phone" class="form-control-luxury" placeholder="SỐ ĐIỆN THOẠI" required>
              </div>
              <div class="col-6">
                <textarea id="address" class="form-control-luxury form-textarea" placeholder="ĐỊA CHỈ" rows="2" required></textarea>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-6">
                <input type="text" id="username" class="form-control-luxury" placeholder="TÊN ĐĂNG NHẬP" required>
              </div>
              <div class="col-6">
                <input type="password" id="password" class="form-control-luxury" placeholder="MẬT KHẨU" required>
              </div>
            </div>

            <div class="input-group mb-4">
              <input type="text" id="otp" class="form-control-luxury border-bottom-0 flex-grow-1" placeholder="MÃ OTP CỦA BẠN" style="border-bottom: 2px solid #eee !important;" required>
              <button class="btn btn-outline-black px-4 py-2 border-0 border-bottom border-2 border-light-subtle rounded-0 small fw-bold" type="button" id="sendOtpBtn" style="border-color: #eee !important;">GỬI MÃ</button>
            </div>

            <button type="submit" class="btn btn-black w-100 py-3 mb-3">THAM GIA NGAY</button>
            <div class="text-center">
              <a href="login.html" class="text-muted small text-decoration-none border-bottom">ĐÃ CÓ TÀI KHOẢN? ĐĂNG NHẬP</a>
            </div>
          </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
