<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <title>LMN | Hồ Sơ Cá Nhân</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="index.html">LMN</a>
      <button class="navbar-toggler outline-none border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="bi bi-list fs-2"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="d-flex align-items-center gap-3 ms-auto mt-3 mt-lg-0">
          <a href="cart.html" class="nav-link p-0 position-relative" title="Giỏ Hàng">
            <i class="bi bi-bag fs-5"></i>
            <span id="cart-count" class="position-absolute translate-middle-y translate-middle-x badge rounded-pill bg-black text-white p-1" style="font-size: 0.6rem; top: 0;">0</span>
          </a>
          <a href="orders.html" class="nav-link p-0 d-none" id="order-link-btn" title="Đơn Hàng"><i class="bi bi-box fs-5"></i></a>
          <a href="login.html" class="nav-link p-0" title="Tài khoản"><i class="bi bi-person fs-5"></i></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <h1 class="fw-black text-uppercase text-center mb-5 letter-spacing-5">Hồ Sơ Cá Nhân</h1>
        <div class="border bg-white p-4 p-md-5 shadow-sm">
          <form id="profileForm">
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label small fw-bold text-uppercase">Username</label>
                <input type="text" id="profile-username" class="form-control" readonly>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold text-uppercase">Email</label>
                <input type="email" id="profile-email" class="form-control" readonly>
              </div>
              <div class="col-md-12">
                <label class="form-label small fw-bold text-uppercase">Họ tên</label>
                <input type="text" id="profile-full-name" class="form-control" required>
              </div>
              <div class="col-md-12">
                <label class="form-label small fw-bold text-uppercase">Số điện thoại</label>
                <input type="text" id="profile-phone" class="form-control" required>
              </div>
              <div class="col-md-12">
                <label class="form-label small fw-bold text-uppercase">Địa chỉ</label>
                <textarea id="profile-address" class="form-control" rows="3" required></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-black w-100 py-3 mt-4">LƯU THÔNG TIN</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
