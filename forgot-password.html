<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>LMN | Quên Mật Khẩu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white overflow-hidden">

  <div class="auth-wrapper">
    <!-- Left: Image Side -->
    <div class="auth-image-side d-none d-lg-flex">
      <div class="auth-image-content">
          <a href="index.html" class="navbar-brand text-white text-decoration-none">LMN</a>
          <p class="small text-uppercase letter-spacing-5 mt-3 opacity-75">Khôi phục quyền truy cập</p>
      </div>
    </div>

    <!-- Right: Form Side -->
    <div class="auth-form-side">
      <div class="auth-card">
          <div class="mb-5">
              <a href="index.html" class="text-black text-decoration-none d-lg-none d-block mb-4 fw-black fs-2">LMN</a>
              <h2 class="fw-black text-uppercase letter-spacing-5 mb-2">Quên Mật Khẩu</h2>
              <p class="text-muted small">Chúng tôi sẽ gửi mã xác thực đến email của bạn.</p>
          </div>

          <!-- Step 1: Enter Email -->
          <div id="step-1">
            <div class="mb-5">
              <input type="email" id="forgot-email" class="form-control-luxury" placeholder="NHẬP EMAIL CỦA BẠN" required>
            </div>
            <button id="send-reset-otp-btn" class="btn btn-black w-100 py-3">GỬI MÃ XÁC THỰC</button>
          </div>

          <!-- Step 2: Enter OTP and New Password -->
          <div id="step-2" class="d-none">
            <div class="mb-4">
              <input type="text" id="reset-otp" class="form-control-luxury" placeholder="MÃ OTP (6 CHỮ SỐ)" required>
            </div>
            <div class="mb-5">
              <input type="password" id="new-password" class="form-control-luxury" placeholder="MẬT KHẨU MỚI" required>
            </div>
            <button id="reset-password-btn" class="btn btn-black w-100 py-3">CẬP NHẬT MẬT KHẨU</button>
          </div>

          <div class="text-center mt-5">
            <a href="login.html" class="text-muted small text-decoration-none border-bottom">QUAY LẠI ĐĂNG NHẬP</a>
          </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const step1 = document.getElementById("step-1");
      const step2 = document.getElementById("step-2");
      const sendOtpBtn = document.getElementById("send-reset-otp-btn");
      const resetPwdBtn = document.getElementById("reset-password-btn");

      sendOtpBtn.addEventListener("click", async () => {
        const email = document.getElementById("forgot-email").value.trim();
        if (!email) {
          alert("Vui lòng nhập email");
          return;
        }

        sendOtpBtn.disabled = true;
        sendOtpBtn.innerText = "ĐÃ GỬI";

        try {
          const response = await fetch(`${API_BASE_URL}/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
          });
          const result = await response.json();
          if (response.ok) {
            alert(result.message);
            step1.classList.add("d-none");
            step2.classList.remove("d-none");
          } else {
            alert(result.message || "Lỗi gửi OTP");
            sendOtpBtn.disabled = false;
            sendOtpBtn.innerText = "GỬI MÃ XÁC THỰC";
          }
        } catch (err) {
          alert("Lỗi kết nối");
          sendOtpBtn.disabled = false;
          sendOtpBtn.innerText = "GỬI MÃ XÁC THỰC";
        }
      });

      resetPwdBtn.addEventListener("click", async () => {
        const email = document.getElementById("forgot-email").value.trim();
        const otp = document.getElementById("reset-otp").value.trim();
        const newPassword = document.getElementById("new-password").value.trim();

        if (!otp || !newPassword) {
          alert("Vui lòng nhập đầy đủ OTP và mật khẩu mới");
          return;
        }

        resetPwdBtn.disabled = true;
        resetPwdBtn.innerText = "ĐANG XỬ LÝ...";

        try {
          const response = await fetch(`${API_BASE_URL}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp, newPassword })
          });
          const result = await response.json();
          if (response.ok) {
            alert("Đổi mật khẩu thành công. Vui lòng đăng nhập lại.");
            window.location.href = "login.html";
          } else {
            alert(result.message || "Lỗi đổi mật khẩu");
            resetPwdBtn.disabled = false;
            resetPwdBtn.innerText = "CẬP NHẬT MẬT KHẨU";
          }
        } catch (err) {
          alert("Lỗi kết nối");
          resetPwdBtn.disabled = false;
          resetPwdBtn.innerText = "CẬP NHẬT MẬT KHẨU";
        }
      });
    });
  </script>
</body>
</html>
