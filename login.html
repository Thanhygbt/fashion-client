<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>LMN | Đăng Nhập</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white overflow-hidden">

  <div class="auth-wrapper">
    <!-- Left: Image Side -->
    <div class="auth-image-side d-none d-lg-flex">
      <div class="auth-image-content">
          <a href="index.html" class="navbar-brand text-white text-decoration-none">LMN</a>
          <p class="small text-uppercase letter-spacing-5 mt-3 opacity-75">Tối giản trong từng khoảnh khắc</p>
      </div>
    </div>

    <!-- Right: Form Side -->
    <div class="auth-form-side">
      <div class="auth-card">
          <div class="mb-5">
              <a href="index.html" class="text-black text-decoration-none d-lg-none d-block mb-4 fw-black fs-2">LMN</a>
              <h2 class="fw-black text-uppercase letter-spacing-5 mb-2">Đăng Nhập</h2>
              <p class="text-muted small">Chào mừng bạn quay lại với LMN Fashion.</p>
          </div>

          <form id="loginForm">
            <div class="mb-4">
              <input type="text" id="username" class="form-control-luxury" placeholder="TÊN ĐĂNG NHẬP" required>
            </div>
            <div class="mb-5">
              <input type="password" id="password" class="form-control-luxury" placeholder="MẬT KHẨU" required>
            </div>
            <button type="submit" class="btn btn-black w-100 py-3 mb-4">TIẾP TỤC</button>
            <div class="text-center">
              <a href="register.html" class="text-muted small text-decoration-none border-bottom d-block mb-3">CHƯA CÓ TÀI KHOẢN? ĐĂNG KÝ NGAY</a>
              <a href="forgot-password.html" class="text-muted small text-decoration-none border-bottom">QUÊN MẬT KHẨU?</a>
            </div>
          </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
